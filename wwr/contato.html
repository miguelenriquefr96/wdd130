<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fale conosco</title>
    <link rel="stylesheet" href="estilos/rafting.css">
    <meta name="description" content="Duvidas? interesse? Fale conosco! preencha o formulario e iremos te contatar!">
    <meta name="author" content="Miguel Enrique Fernandez Rodriguez">
</head>

<body>
    <header>
        <img src="././imagens/logo-rafting.jpg" alt="Uma nova aventura com Rafting" width="200">
        <nav>
            <ul>
                <li><a href="index.html">Página Inicial</a></li>
                <li><a href="sobre.html">Sobre Nós</a></li>
                <li><a href="passeios.html">Passeios</a></li>
                <li><a href="contato.html">Fale Conosco</a></li>
            </ul>
        </nav>

    </header>
    <main>
        <div class="contato-form-container">
            <section class="contato">
                <h2>Adventure Rafting</h2>
                <p>Rua das Aventuras, 123 - Pinhais</p>
                <p> Paraná - Brasil </p>
                <p>+55 41 99999-9999</p>
                <p>contato@raftingadventures.com.br</p>
            </section>
            <div class="conteudo-contato">
                <section class="mapa">
                    <iframe
                        src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d2588.415963651368!2d-49.12029722166631!3d-25.413407183449046!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x94dcedd920ab3965%3A0xf55f18189ced792a!2sCh%C3%A1cara%20Villar!5e1!3m2!1ses-419!2sbr!4v1780767583821!5m2!1ses-419!2sbr"
                        width="600" height="450" allowfullscreen="" loading="lazy"></iframe>
                </section>

                <section class="formulario">
                    <form action="#" method="post">
                        <div class="campo">
                            <label for="nome">Nome:</label>
                            <input type="text" id="nome" name="nome" placeholder="digite aqui" required>
                        </div>

                        <div class="campo">
                            <label for="email">E-mail:</label>
                            <input type="email" id="email" name="email" placeholder="digite aqui" required>
                        </div>

                        <div class="campo">
                            <label class="titulo-proposito">Proposito da<br>mensagem:</label>
                            <div class="opcoes">
                                <label class="opcao">
                                    <input type="radio" id="consulta" name="proposito" value="consulta">
                                    Dúvida Geral
                                </label>
                                <label class="opcao">
                                    <input type="radio" id="reserva" name="proposito" value="reserva">
                                    Pergunta sobre Reserva
                                </label>
                                <label class="opcao">
                                    <input type="radio" id="sugestao" name="proposito" value="sugestao">
                                    Sugestão de Site
                                </label>
                            </div>
                        </div>

                        <div class="campo">
                            <label for="mensagem">Mensagem:</label>
                            <textarea id="mensagem" name="mensagem" rows="5" cols="40"
                                placeholder="digite aqui"></textarea>
                        </div>

                        <div class="newsletter">
                            <input type="checkbox" id="newsletter" name="newsletter">
                            <label for="newsletter">Por favor, quero receber a newsletter mensal</label>
                        </div>

                        <button type="submit">Enviar Mensagem</button>
                    </form>
                </section>
            </div>
        </div>
        <section class="equipe">
            <h2>Estamos Aqui para Servi-lo</h2>
            <figure>
                <img src="././imagens/intrutor2.jpg" alt="João - Guia de Rafting" width="200">
                <figcaption>João - Guia de Rafting</figcaption>
            </figure>
            <figure>
                <img src="././imagens/atendente.jpg" alt="Maria - Atendimento ao Cliente" width="200">
                <figcaption>Maria - Atendimento ao Cliente</figcaption>
            </figure>
            <figure>
                <img src="././imagens/intrutor1.jpg" alt="Carlos - Instrutor de Segurança" width="200">
                <figcaption>Carlos - Instrutor de Segurança</figcaption>
            </figure>
        </section>
    </main>
    <footer>
        <p>© 2026 | Rafting Adventures | Miguel Enrique </p>
        <nav class="redes-sociais">
            <a href="https://instagram.com">
                <img src="././imagens/instagram-bw.svg" alt="Nosso Insta" width="100">
            </a>
            <a href="https://youtube.com">
                <img src="././imagens/youtube-bw.svg" alt="Nosso canal Youtube" width="100">
            </a>
            <a href="https://pinterest.com">
                <img src="././imagens/pinterest-bw.svg" alt="Nosso pinterest" width="100">
            </a>
        </nav>
    </footer>
</body>

</html>
